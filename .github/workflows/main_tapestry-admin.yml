# Build + deploy ONLY apps/admin to Azure Web App: tapestry-admin

name: Deploy tapestry-admin

on:
  push:
    branches: [main]
    paths:
      - "apps/admin/**"
      - "packages/ui/**"
      - "packages/api-client/**"
      - "packages/types/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/main_tapestry-admin.yml"
  workflow_dispatch:

concurrency:
  group: tapestry-admin-prod
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          # cache: "pnpm"

      - name: Configure pnpm to avoid symlinked node_modules (CI only)
        run: |
          echo "node-linker=hoisted" >> .npmrc
          echo "public-hoist-pattern[]=*" >> .npmrc
          echo "shamefully-hoist=true" >> .npmrc
          cat .npmrc

      - name: Enable corepack + activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate
          pnpm --version

      - name: Install deps (workspace)
        run: pnpm install --frozen-lockfile --prod=false

      - name: Build admin
        run: pnpm -w --filter @tapestry/admin... build

      - name: Fail if standalone has broken symlinks
        run: |
          BROKEN=$(find apps/admin/.next/standalone -type l -xtype l | wc -l)
          if [ "$BROKEN" -ne 0 ]; then
            echo "Broken symlinks found in standalone output:"
            find apps/admin/.next/standalone -type l -xtype l
            exit 1
          fi
      - name: Create standalone deploy artifact (admin)
        run: |
          rm -rf deploy-admin
          mkdir -p deploy-admin

          # Copy standalone output and DEREFERENCE symlinks
          rsync -aL apps/admin/.next/standalone/ deploy-admin/

          # Put static + public next to the app root inside the standalone tree
          mkdir -p deploy-admin/apps/admin/.next
          rsync -a apps/admin/.next/static/ deploy-admin/apps/admin/.next/static/
          rsync -a apps/admin/public/ deploy-admin/apps/admin/public/

          cd deploy-admin && zip -r ../deploy-admin.zip . && cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-admin
          path: deploy-admin.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-admin

      - name: Deploy to Azure Web App (admin)
        uses: azure/webapps-deploy@v3
        with:
          app-name: "tapestry-admin"
          slot-name: "Production"
          package: deploy-admin.zip
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_134BB834E1F24091923F81F40707244C }}
