# Build + deploy ONLY apps/admin to Azure Web App: tapestry-admin

name: Deploy tapestry-admin

on:
  push:
    branches: [main]
    paths:
      - "apps/admin/**"
      - "packages/ui/**"
      - "packages/api-client/**"
      - "packages/types/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/main_tapestry-admin.yml"
  workflow_dispatch:

concurrency:
  group: tapestry-admin-prod
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Install deps (workspace)
        run: pnpm install --frozen-lockfile

      - name: Build admin
        run: pnpm -C apps/admin build

      - name: Create standalone deploy artifact (admin)
        run: |
          rm -rf deploy-admin
          mkdir -p deploy-admin

          # Copy Next standalone output
          cp -R apps/admin/.next/standalone/* deploy-admin/

          # Copy static + public (required for standalone)
          mkdir -p deploy-admin/.next
          cp -R apps/admin/.next/static deploy-admin/.next/static
          cp -R apps/admin/public deploy-admin/public

          # Zip for deployment
          cd deploy-admin
          zip -r ../deploy-admin.zip .
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-admin
          path: deploy-admin.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-admin

      - name: Deploy to Azure Web App (admin)
        uses: azure/webapps-deploy@v3
        with:
          app-name: "tapestry-admin"
          slot-name: "Production"
          package: deploy-admin.zip
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_134BB834E1F24091923F81F40707244C }}
