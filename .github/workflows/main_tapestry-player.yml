# Build + deploy ONLY apps/player to Azure Web App: tapestry-player

name: Deploy tapestry-player

on:
  push:
    branches: [ main ]
    paths:
      - "apps/player/**"
      - "packages/ui/**"
      - "packages/api-client/**"
      - "packages/types/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/main_tapestry-player.yml"
  workflow_dispatch:

concurrency:
  group: tapestry-player-prod
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Enable corepack + activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate
          pnpm --version

      - name: Install deps (workspace)
        run: pnpm install --frozen-lockfile

      - name: Build player
        run: pnpm -C apps/player build

      - name: Create standalone deploy artifact (player)
        run: |
          rm -rf deploy-player
          mkdir -p deploy-player

          # Copy Next standalone output
          cp -R apps/player/.next/standalone/* deploy-player/

          # Copy static + public (required for standalone)
          mkdir -p deploy-player/.next
          cp -R apps/player/.next/static deploy-player/.next/static
          cp -R apps/player/public deploy-player/public

          # Zip for deployment
          cd deploy-player
          zip -r ../deploy-player.zip .
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-player
          path: deploy-player.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-player

      - name: Deploy to Azure Web App (player)
        uses: azure/webapps-deploy@v3
        with:
          app-name: "tapestry-player"
          slot-name: "Production"
          package: deploy-player.zip
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_C46D4977194F4C428F91F10E1F6A9A3A }}