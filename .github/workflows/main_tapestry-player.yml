# Build + deploy ONLY apps/player to Azure Web App: tapestry-player

name: Deploy tapestry-player

on:
  push:
    branches: [ main ]
    paths:
      - "apps/player/**"
      - "packages/ui/**"
      - "packages/api-client/**"
      - "packages/types/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/main_tapestry-player.yml"
  workflow_dispatch:

concurrency:
  group: tapestry-player-prod
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Configure pnpm to avoid symlinked node_modules (CI only)
        run: |
          echo "node-linker=hoisted" >> .npmrc
          echo "public-hoist-pattern[]=*" >> .npmrc
          echo "shamefully-hoist=true" >> .npmrc
          cat .npmrc

      - name: Enable corepack + activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.4 --activate
          pnpm --version

      - name: Install deps (workspace)
        run: pnpm install --frozen-lockfile

      - name: Build player
        run: pnpm -C apps/player build

      - name: Fail if standalone has broken symlinks
        run: |
          BROKEN=$(find apps/player/.next/standalone -type l -xtype l | wc -l)
          if [ "$BROKEN" -ne 0 ]; then
            echo "Broken symlinks found in standalone output:"
            find apps/player/.next/standalone -type l -xtype l
            exit 1
          fi
      - name: Create standalone deploy artifact (player)
        run: |
          rm -rf deploy-player
          mkdir -p deploy-player

          # Copy standalone output and DEREFERENCE symlinks
          rsync -aL apps/player/.next/standalone/ deploy-player/

          # Put static + public next to the app root inside the standalone tree
          mkdir -p deploy-player/apps/player/.next
          rsync -a apps/player/.next/static/ deploy-player/apps/player/.next/static/
          rsync -a apps/player/public/ deploy-player/apps/player/public/

          cd deploy-player && zip -r ../deploy-player.zip . && cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-player
          path: deploy-player.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-player

      - name: Deploy to Azure Web App (player)
        uses: azure/webapps-deploy@v3
        with:
          app-name: "tapestry-player"
          slot-name: "Production"
          package: deploy-player.zip
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_C46D4977194F4C428F91F10E1F6A9A3A }}